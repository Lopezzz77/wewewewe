{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - FunkoMarket</title>
<link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <h1 class="logo">🛠️ Admin <span>Panel</span></h1>
    <nav class="nav">
      <a href="{% static 'index.html' %}" class="btn-admin">← Volver a la tienda</a>
      <button id="themeToggle" class="theme-toggle" title="Cambiar tema">🌙</button>
    </nav>
  </div>
</header>

<main class="container admin-main">
  <section class="form-card">
    <h2 id="formTitle">Cargar nuevo producto</h2>
    <form id="productForm">
      <input type="hidden" id="productId">
      <div class="form-row">
        <label>Nombre
          <input type="text" id="name" required>
        </label>
        <label>Precio (USD)
          <input type="number" id="price" min="0" step="0.01" required>
        </label>
      </div>
      <div class="form-row">
        <label>Empresa
          <select id="empresa" required>
            <option value="">-- Seleccionar --</option>
            <option>Marvel</option>
            <option>DC</option>
            <option>Disney</option>
            <option>Star Wars</option>
            <option>Anime</option>
          </select>
        </label>
        <label>Película / Personaje
          <input type="text" id="pelicula" placeholder="Spiderman, Batman, ..." required>
        </label>
      </div>
      <div class="form-row">
        <label>Stock
          <input type="number" id="stock" min="0" required>
        </label>
        <label>URL de imagen
          <input type="url" id="image" placeholder="https://..." required>
        </label>
      </div>
      <label>Descripción
        <textarea id="description" rows="3" required></textarea>
      </label>
      <div class="form-actions">
        <button type="submit" class="btn-primary" id="submitBtn">Guardar producto</button>
        <button type="button" class="btn-secondary" id="cancelBtn" hidden>Cancelar edición</button>
      </div>
    </form>
  </section>

  <section class="admin-list">
    <h2>Productos cargados</h2>
    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr><th></th><th>Nombre</th><th>Empresa</th><th>Personaje</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
        </thead>
        <tbody id="adminTbody"></tbody>
      </table>
    </div>
  </section>
</main>

<script src="{% static 'js/data.js' %}"></script>
<script src="admin.js"></script>
</body>
</html>
